<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #030302;
  font-family: 'Poppins', 'Montserrat', 'Inter', sans-serif;
}
.panel {
  width: 820px;
  min-height: 1040px;
  background: #0D0F0A;
  border: 1px solid rgba(215, 240, 0, 0.45);
  border-radius: 36px;
  padding: 55px 80px 60px;
  box-shadow: 0 0 18px rgba(215, 240, 0, 0.22);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.emblem {
  width: 132px;
  height: 132px;
  border-radius: 50%;
  border: 2px solid rgba(215, 240, 0, 0.7);
  box-shadow: 0 0 18px rgba(215, 240, 0, 0.45);
  overflow: hidden;
  flex-shrink: 0;
  background: transparent;
}
.emblem img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.title {
  color: #F1E8C9;
  font-size: 44px;
  font-weight: 700;
  margin-top: 40px;
  margin-bottom: 8px;
  text-align: center;
  line-height: 1.2;
}
.subtitle {
  color: #BFB68F;
  font-size: 21px;
  font-weight: 400;
  margin-bottom: 48px;
  text-align: center;
  line-height: 1.3;
}
.form-group {
  width: 640px;
  margin-bottom: 28px;
}
.form-group:last-of-type {
  margin-bottom: 0;
}
.form-group label {
  display: block;
  color: #F1E8C9;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 10px;
}
.input-wrapper {
  position: relative;
  width: 100%;
}
.input-wrapper input {
  width: 100%;
  height: 72px;
  background: #090B07;
  border: 1px solid rgba(215, 240, 0, 0.28);
  border-radius: 12px;
  padding-left: 82px;
  padding-right: 60px;
  color: #F1E8C9;
  font-size: 20px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.input-wrapper input:focus {
  border-color: #D7F000;
}
.input-wrapper input::placeholder {
  color: #8F8B72;
}
.input-wrapper .icon-left,
.input-wrapper .icon-right {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.input-wrapper .icon-left {
  left: 28px;
}
.input-wrapper .icon-right {
  right: 28px;
  cursor: pointer;
}
.spacer {
  height: 32px;
}
.btn-acessar {
  width: 640px;
  height: 78px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #8EA300, #D7F000, #8EA300);
  color: #F1E8C9;
  font-size: 27px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 0 18px rgba(215, 240, 0, 0.75), inset 0 0 18px rgba(255, 255, 255, 0.12);
  position: relative;
  overflow: hidden;
  transition: filter 0.2s;
}
.btn-acessar:hover {
  filter: brightness(1.1);
}
.btn-acessar::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      60deg,
      transparent,
      transparent 10px,
      rgba(255, 255, 255, 0.035) 10px,
      rgba(255, 255, 255, 0.035) 11px
    ),
    repeating-linear-gradient(
      -60deg,
      transparent,
      transparent 10px,
      rgba(255, 255, 255, 0.035) 10px,
      rgba(255, 255, 255, 0.035) 11px
    );
  pointer-events: none;
}
.btn-acessar .btn-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.btn-acessar span:not(.btn-icon) {
  position: relative;
  z-index: 1;
}
.divider {
  width: 640px;
  display: flex;
  align-items: center;
  gap: 18px;
  margin-top: 32px;
  margin-bottom: 28px;
}
.divider .line {
  flex: 1;
  height: 1px;
  background: rgba(215, 240, 0, 0.65);
}
.divider .text {
  color: #BFB68F;
  font-size: 18px;
  white-space: nowrap;
}
.bottom-buttons {
  display: flex;
  gap: 32px;
  width: 640px;
}
.btn-secondary {
  flex: 1;
  height: 68px;
  background: #090B07;
  border: 1px solid #D7F000;
  border-radius: 12px;
  color: #F1E8C9;
  font-size: 21px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.2s;
}
.btn-secondary:hover {
  background: rgba(215, 240, 0, 0.08);
}
.btn-secondary .btn-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>
<div class="panel">

  <div class="emblem">
    <img src="./assets/logo.png" alt="Logo">
  </div>

  <h1 class="title">Bem-vindo de volta</h1>

  <p class="subtitle" style="margin-bottom: 32px;">Acesse sua conta para continuar</p>

  <div class="form-group">
    <label>User</label>
    <div class="input-wrapper">
      <span class="icon-left">
        <svg viewBox="0 0 26 26" width="26" height="26">
          <circle cx="13" cy="8" r="5" stroke="#D8D0A0" stroke-width="2" fill="none"/>
          <path d="M2 24 C2 15, 24 15, 24 24" stroke="#D8D0A0" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <input type="text" placeholder="Digite seu usuário">
    </div>
  </div>

  <div class="form-group">
    <label>Senha</label>
    <div class="input-wrapper">
      <span class="icon-left">
        <svg viewBox="0 0 26 26" width="26" height="26">
          <path d="M7 12 V7.5 A6 6 0 0 1 19 7.5 V12" stroke="#D8D0A0" stroke-width="2" fill="none" stroke-linecap="round"/>
          <rect x="5" y="11" width="16" height="12" rx="2" stroke="#D8D0A0" stroke-width="2" fill="none"/>
          <circle cx="13" cy="17" r="2" fill="#D8D0A0"/>
        </svg>
      </span>
      <input type="password" placeholder="Digite sua senha">
      <span class="icon-right">
        <svg viewBox="0 0 26 26" width="26" height="26">
          <path d="M2 13 C6 6, 20 6, 24 13 C20 20, 6 20, 2 13" stroke="#D8D0A0" stroke-width="2" fill="none"/>
          <circle cx="13" cy="13" r="3" fill="#D8D0A0"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="form-group">
    <label>Chave Key</label>
    <div class="input-wrapper">
      <span class="icon-left">
        <svg viewBox="0 0 26 26" width="26" height="26">
          <circle cx="9" cy="13" r="6" stroke="#D8D0A0" stroke-width="2" fill="none"/>
          <line x1="14" y1="13" x2="22" y2="13" stroke="#D8D0A0" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="13" x2="20" y2="18" stroke="#D8D0A0" stroke-width="2" stroke-linecap="round"/>
          <line x1="17" y1="13" x2="17" y2="16" stroke="#D8D0A0" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <input type="text" placeholder="Digite sua chave">
      <span class="icon-right">
        <svg viewBox="0 0 26 26" width="26" height="26">
          <rect x="4" y="4" width="18" height="18" rx="3" stroke="#D8D0A0" stroke-width="2" fill="none"/>
          <line x1="8" y1="13" x2="18" y2="13" stroke="#D8D0A0" stroke-width="2" stroke-linecap="round"/>
          <line x1="13" y1="8" x2="13" y2="18" stroke="#D8D0A0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="spacer"></div>

  <button class="btn-acessar">
    <span class="btn-icon">
      <svg viewBox="0 0 28 28" width="28" height="28">
        <line x1="4" y1="14" x2="24" y2="14" stroke="#F1E8C9" stroke-width="3" stroke-linecap="round"/>
        <polyline points="17,7 24,14 17,21" stroke="#F1E8C9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </span>
    Acessar
  </button>

  <div class="divider">
    <span class="line"></span>
    <span class="text">ou</span>
    <span class="line"></span>
  </div>

  <div class="bottom-buttons">
    <button class="btn-secondary">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <circle cx="10" cy="7" r="4.5" stroke="#D7F000" stroke-width="2" fill="none"/>
          <path d="M1 23 C1 15, 19 15, 19 23" stroke="#D7F000" stroke-width="2" fill="none" stroke-linecap="round"/>
          <line x1="17" y1="5" x2="23" y2="5" stroke="#D7F000" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="2" x2="20" y2="8" stroke="#D7F000" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      Registrar
    </button>
    <button class="btn-secondary">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <circle cx="8" cy="12" r="5.5" stroke="#D7F000" stroke-width="2" fill="none"/>
          <line x1="13" y1="12" x2="21" y2="12" stroke="#D7F000" stroke-width="2" stroke-linecap="round"/>
          <line x1="19" y1="12" x2="19" y2="16" stroke="#D7F000" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="12" x2="16" y2="14" stroke="#D7F000" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      Ativar
    </button>
  </div>

</div>
</body>
</html>
